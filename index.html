<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keith's Cocktail Lab &mdash; Bartender Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1B2A3E;--navy-deep:#0F1C2E;--navy-mid:#243549;
  --gold:#C4972A;--gold-light:#D4A84B;--gold-pale:#F0DFA0;
  --cream:#F7F4EF;--ink:#1C1F26;--mid:#4A4A4A;--silver:#8A9AAA;
  --rule:#C4972A;--row-alt:#F2ECE0;--white:#FFFFFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'EB Garamond',Georgia,serif;min-height:100vh;}

/* HERO */
.hero{background:var(--navy-deep);padding:44px 20px 32px;text-align:center;position:relative;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(196,151,42,0.12) 0%,transparent 65%);pointer-events:none;}
.hero-eyebrow{font-size:10px;letter-spacing:0.4em;color:var(--gold-light);text-transform:uppercase;margin-bottom:10px;font-family:'Cormorant Garamond',serif;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,8vw,58px);font-weight:600;color:var(--cream);line-height:1;letter-spacing:0.04em;}
.hero-title span{color:var(--gold);}
.hero-rule{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px auto;color:var(--gold);font-size:14px;}
.hero-rule::before,.hero-rule::after{content:'';width:40px;height:1px;background:var(--gold);opacity:0.5;}
.hero-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--silver);letter-spacing:0.06em;}

/* SEARCH */
.controls{position:sticky;top:0;z-index:100;background:var(--navy);padding:12px 16px;box-shadow:0 2px 16px rgba(0,0,0,0.3);}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gold-light);font-size:14px;pointer-events:none;}
#search{width:100%;padding:10px 12px 10px 36px;background:rgba(255,255,255,0.07);border:1px solid rgba(196,151,42,0.35);border-radius:6px;color:var(--cream);font-family:'EB Garamond',serif;font-size:16px;outline:none;transition:border-color 0.2s,background 0.2s;}
#search::placeholder{color:rgba(247,244,239,0.3);}
#search:focus{border-color:var(--gold);background:rgba(255,255,255,0.1);}

/* SECTIONS */
.sections{padding:8px 0 40px;}
.section{border-bottom:1px solid rgba(196,151,42,0.2);}
.section-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px;background:transparent;border:none;cursor:pointer;text-align:left;transition:background 0.15s;}
.section-toggle:hover{background:rgba(196,151,42,0.05);}
.section-toggle.open{background:rgba(27,42,62,0.04);}
.section-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--navy);letter-spacing:0.03em;}
.section-meta{display:flex;align-items:center;gap:10px;}
.section-count{font-size:12px;color:var(--gold-light);letter-spacing:0.05em;}
.section-chevron{color:var(--gold);font-size:12px;transition:transform 0.25s;}
.section-toggle.open .section-chevron{transform:rotate(180deg);}
.section-body{display:none;padding:0 16px 16px;}
.section-body.open{display:block;}

/* SUBSECTION */
.subsection{margin-bottom:20px;}
.subsection:last-child{margin-bottom:0;}
.subsection-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--navy);letter-spacing:0.06em;text-transform:uppercase;padding:10px 0 8px;border-bottom:2px solid var(--gold);margin-bottom:10px;}

/* TABLES */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:15px;}
thead tr{background:var(--navy);}
thead th{padding:8px 10px;text-align:left;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.08em;color:var(--gold);font-weight:600;text-transform:uppercase;}
tbody tr:nth-child(even){background:var(--row-alt);}
tbody tr:nth-child(odd){background:var(--white);}
tbody td{padding:8px 10px;vertical-align:top;color:var(--mid);border-bottom:1px solid rgba(196,151,42,0.12);line-height:1.5;}
tbody td:first-child{font-weight:600;color:var(--ink);white-space:nowrap;}

/* Single-column tables (no header) */
table.no-header tbody td:first-child{white-space:normal;}

/* BULLETS */
.ref-bullets{list-style:none;padding:4px 0;}
.ref-bullets li{padding:7px 0 7px 20px;position:relative;border-bottom:1px solid rgba(196,151,42,0.1);color:var(--mid);font-size:16px;line-height:1.5;}
.ref-bullets li:last-child{border-bottom:none;}
.ref-bullets li::before{content:'\2726';position:absolute;left:0;color:var(--gold);font-size:10px;top:10px;}

/* EMPTY */
.search-empty{text-align:center;padding:48px 24px;color:var(--silver);font-style:italic;font-size:18px;}

footer{text-align:center;padding:28px 24px;color:var(--silver);font-size:13px;font-style:italic;border-top:1px solid rgba(196,151,42,0.2);}
</style>
</head>

 or Espolon for bright citrus drinks"]]},{"name":"Rum \u2014 Planteray 3 Stars \u00b7 Smith & Cross \u00b7 Diplomatico Reserva","type":"table","headers":["",""],"rows":[["Best drinks","Daiquiri, Mai Tai, Jungle Bird, Rum Old Fashioned, Tropical Punch"],["Flavor pairings","Lime, pineapple, banana, passionfruit, demerara, falernum, orgeat"],["Quick daiquiri","2 oz Planteray \u00b7 3/4 oz lime \u00b7 1/2 oz simple \u00b7 shake \u00b7 coupe"],["Quick tiki","1.5 oz Planteray + 1/2 oz Smith & Cross \u00b7 3/4 oz lime \u00b7 1/2 oz orgeat \u00b7 shake"],["Notes","Smith & Cross for funky tiki depth; Diplomatico for rum Old Fashioneds"]]},{"name":"Whiskey & Bourbon \u2014 Woodford \u00b7 Bulleit \u00b7 Bulleit Rye \u00b7 Balvenie \u00b7 Glenlivet","type":"table","headers":["",""],"rows":[["Best drinks","Old Fashioned, Manhattan, Boulevardier, Whiskey Sour, Rob Roy"],["Flavor pairings","Orange, cherry, chocolate bitters, honey, lemon, demerara"],["Quick Old Fashioned","2 oz Woodford \u00b7 1/4 oz demerara \u00b7 2 dashes Angostura + orange bitters \u00b7 stir \u00b7 rocks"],["Quick sour","2 oz Woodford \u00b7 3/4 oz lemon \u00b7 1/2 oz demerara \u00b7 egg white \u00b7 dry shake then ice"],["Notes","Bulleit Rye for Manhattans; Woodford for Old Fashioneds; Balvenie for Rob Roy"]]},{"name":"Vodka \u2014 Grey Goose \u00b7 Tito's \u00b7 Belvedere Unfiltered \u00b7 Ketel One Citron","type":"table","headers":["",""],"rows":[["Best drinks","Espresso Martini, Lemon Drop, Vodka Collins, Highballs, White Russian"],["Flavor pairings","Lemon, yuzu, coffee, vanilla, grapefruit, elderflower"],["Quick build","2 oz vodka \u00b7 citrus or coffee \u00b7 syrup or liqueur \u00b7 shake \u00b7 coupe or rocks"],["Notes","Grey Goose for Espresso Martini; Ketel One Citron for Lemon Drop and citrus builds"]]},{"name":"Cognac & Brandy \u2014 D'usse \u00b7 Braastad VSOP \u00b7 Laird's Applejack","type":"table","headers":["",""],"rows":[["Best drinks","Sidecar, Vieux Carre, Brandy Alexander, French 75 variation, Stinger"],["Flavor pairings","Lemon, orange liqueur, honey, cinnamon, apple, dark fruit"],["Quick sour","2 oz cognac \u00b7 3/4 oz lemon \u00b7 1/2 oz Cointreau \u00b7 shake \u00b7 coupe with sugar rim"],["Notes","Laird's Applejack for fall cocktails; D'usse for spirit-forward drinks"]]},{"name":"Aperitivo & Amaro \u2014 Aperol \u00b7 Campari \u00b7 Amaro Nonino \u00b7 Fernet-Branca \u00b7 Italicus","type":"table","headers":["",""],"rows":[["Best drinks","Negroni, Boulevardier, Spritz, Amaro Sour, Paper Plane"],["Flavor pairings","Orange, lemon, grapefruit, prosecco, vermouth"],["Quick Negroni","1 oz gin \u00b7 1 oz Campari \u00b7 1 oz sweet vermouth \u00b7 stir \u00b7 rocks"],["Quick Spritz","2 oz Aperol or Italicus \u00b7 3 oz prosecco \u00b7 1 oz soda \u00b7 wine glass"],["Notes","Italicus adds bergamot; Amaro Nonino adds alpine bitterness; Fernet is a long drink or digestif"]]},{"name":"Coffee & Dessert \u2014 Mr Black \u00b7 Kahlua \u00b7 Frangelico \u00b7 Creme de Cacao \u00b7 Disaronno","type":"table","headers":["",""],"rows":[["Best drinks","Espresso Martini, White Russian, Dessert Martinis, Nutty Russian"],["Flavor pairings","Coffee, chocolate, cream, vanilla, hazelnut, banana"],["Quick build","2 oz vodka or whiskey \u00b7 1 oz Mr Black or Kahlua \u00b7 fresh espresso \u00b7 shake"],["Notes","Mr Black is drier and more coffee-forward than Kahlua \u2014 use for Espresso Martini"]]}]},{"name":"Cocktail Creation Matrix","subsections":[{"name":"The Matrix","type":"table","headers":["Base Spirit","Citrus","Sweet","Modifier / Flavor","Bitters / Finish"],"rows":[["Tequila (Espolon/Altos)","Lime","Simple Syrup","Cointreau","Angostura"],["Tequila","Grapefruit","Honey Syrup","Chinola Passionfruit","Grapefruit Bitters"],["Gin (Hendrick's/Botanist)","Lemon","Basil Syrup","St-Germain","Orange Bitters"],["Gin","Yuzu","Demerara Syrup","Italicus","Celery Bitters"],["Vodka","Lemon","Simple Syrup","Chambord","Peach Bitters"],["Rum (Planteray)","Lime","Demerara Syrup" maro","Coffee, chocolate","Dessert cocktails, Old Fashioned riffs"],["Celery","Savory herbal","Gin, Vodka, Tequila","Cucumber, tomato, lime","Savory Martinis, Bloody Mary riffs"],["Chocolate","Rich cocoa bitterness","Bourbon, Rum, Brandy","Coffee, orange peel","Espresso Martini, dessert drinks"],["Grapefruit","Bitter citrus, floral","Gin, Tequila, Vodka","Grapefruit juice, yuzu","Palomas, grapefruit highballs"]]},{"name":"Typical Bitters Usage","type":"table","headers":["Drink Style","Amount"],"rows":[["Spirit-forward cocktails","2-3 dashes"],["Citrus / sour cocktails","1-2 dashes"],["Highballs","1 dash"],["Habanero and spicy bitters","1 dash or less \u2014 taste first"]]},{"name":"Smoking Gun \u2014 Wood Guide","type":"table","headers":["Wood","Flavor Profile","Best With"],"rows":[["Applewood","Light, slightly sweet smoke","Bourbon drinks, citrus cocktails, gin drinks"],["Cherry","Sweet, fruity smoke","Whiskey cocktails, Old Fashioneds, Manhattans"],["Oak","Deep barrel flavor","Bourbon, Rye, spirit-forward classics"],["Hickory","Strong traditional smoke","Old Fashioned, dark spirit drinks, mezcal"],["Mesquite","Bold earthy smoke","Tequila, Mezcal cocktails"]]},{"name":"Smoking Gun \u2014 Herb & Aromatic Guide","type":"table","headers":["Herb","Aroma Profile","Best With"],"rows":[["Rosemary","Piney aromatic","Gin, Tequila \u2014 citrus cocktails and Martinis"],["Thyme","Herbal, earthy","Whiskey \u2014 lemon-forward drinks"],["Sage","Savory warm","Rum, Bourbon \u2014 fall cocktails"],["Mint","Fresh, cooling","Rum, Bourbon \u2014 Juleps and tropical drinks"],["Lavender","Floral, soft","Gin, Vodka \u2014 light citrus cocktails"]]},{"name":"Smoking Tips","type":"bullets","items":["Break herbs into small pieces so they burn evenly","Avoid powdered spices \u2014 they clog the smoker","Use small amounts of herbs to prevent bitterness in the drink","Smoke 10-20 seconds \u2014 enough aroma without overpowering","Trap smoke briefly by covering the glass \u2014 improves infusion depth","Wood chips 70-80% of blend \u00b7 Herbs / aromatics 20-30%"]},{"name":"Smoke Bubble Techniques","type":"table","headers":["Step","How To"],"rows":[["Step 1 \u2014 Make the cocktail first","Leave a little space at the top of the glass \u2014 aim for 50-60% full. Too full and the bubble touches liquid and pops."],["Step 2 \u2014 Light the wood chips","Turn on the fan so smoke flows through the hose."],["Step 3 \u2014 Prepare the attachment","Dip the bubble attachment into the bubble solution so a thin film covers the end."],["Step 4 \u2014 Form the bubble","Pinch the hose briefly to let the bubble membrane form. Position the attachment over the drink, then release airflow slowly so the smoke inflates the bubble."],["Step 5 \u2014 Size and release","Let the bubble grow to roughly apple size (2-3 inches). Lift the nozzle slightly and tilt sideways \u2014 the bubble detaches and rests on the drink or rim."],["Step 6 \u2014 Guest pops the bubble","When popped, trapped smoke releases directly over the drink for a dramatic aroma reveal."]]},{"name":"Keeping Bubbles From Popping","type":"table","headers":["Trick","How and Why"],"rows":[["Wet the rim first","Lightly mist the rim with water or trace a thin film of bubble solution around the outer rim with your finger. Keep solution off the inside of the glass."],["Use smooth ice","Sharp ice edges pop bubbles instantly. Use large clear cubes, spheres, or a flat liquid surface. Avoid crushed ice."],["Form bubble above the drink","Create the bubble in the air first, then lower it slowly onto the glass and flick the nozzle to release."],["Keep bubbles medium sized","2-3 inches (apple-sized). Too large = thin walls = pops fast."],["Avoid carbonated drinks","CO2 from spritz, champagne, and highballs pops bubbles instantly. Stick to still cocktails."]]}]},{"name":"Ice, Dilution & Garnish","subsections":[{"name":"Ice Guide","type":"table","headers":["Ice Type","Best Used For"],"rows":[["Large cube or sphere (2 inch)","Old Fashioneds, Negronis, Manhattans on rocks \u2014 slow melt preserves flavor"],["Standard cubes (1.25 inch)","Shaking and stirring \u2014 good surface area for chilling and dilution"],["Crushed ice","Smashes, Juleps, Tiki drinks, Swizzles \u2014 fast chill, intentional dilution"],["Collins spear","Highballs and Collins \u2014 fits the glass, slow melt, clean look"],["No ice (up)","Martinis, Daiquiris, Manhattans, Sours \u2014 served fully chilled in glass"]]},{"name":"Dilution Guide","type":"table","headers":["Technique","Effect"],"rows":[["Hard shake (10-12 sec)","25-30% dilution added \u2014 appropriate for sours and citrus drinks"],["Stir (20-30 sec)","20-25% dilution added \u2014 appropriate for spirit-forward drinks"],["Build over ice (no shake/stir)","10-15% dilution \u2014 for highballs, spritzes, built drinks"],["Target water content","Approximately 1 to 1.25 oz of dilution water in a finished cocktail is ideal"]]},{"name":"Batching Guide","type":"table","headers":["Rule","Guidance"],"rows":[["Scaling factor","Multiply each ingredient by the number of servings needed"],["Pre-dilution for stirred drinks","Add 20% water by volume (e.g. 10 oz total spirits \u2014 add 2 oz water)"],["Pre-dilution for shaken drinks","Add 25% water by volume before bottling"],["Citrus in batches","Add fresh citrus no more than 2 hours before service \u2014 it degrades quickly"],["Carbonated batches","Add soda or prosecco only at service \u2014 never pre-batch bubbles"],["Storage","Refrigerate batches \u2014 spirit-only batches keep 1 week; citrus batches keep 2 days"]]},{"name":"Garnish Prep Guide","type":"table","headers":["Garnish","How To Prepare"],"rows":[["Citrus twist","Use a Y-peeler for a clean strip. Express over the drink by pinching skin-side toward the glass. Run around rim, drop in or perch on edge."],["Citrus coin","Cut a thin round disc with minimal pith. Used for a lighter, less aromatic garnish."],["Citrus wheel","Slice through the full cross-section 1/4 inch thick. Score the center to sit on the rim."],["Half-wheel","Cut wheel in half. Best for highballs and Collins glasses."],["Expressed peel (discard)","Express oils over the drink, rub around the rim, then discard peel \u2014 used when you want aroma without a visual garnish."],["Herb sprig","Slap fresh herbs against your palm before garnishing to release aromatics. Place upright in drink or on rim."],["Dehydrated citrus","Dry in oven at 170F for 3-4 hours, flipping once. Store in airtight jar up to 3 months."],["Salt / Sugar rim","Rim only half the glass \u2014 gives the guest the choice. Use citrus juice as adhesive, then roll in salt or sugar."]]}]},{"name":"Syrups & Prep","subsections":[{"name":"Core Bar Syrups","type":"table","headers":["Syrup","Recipe"],"rows":[["Simple Syrup (1:1)","1 cup water + 1 cup sugar. Heat gently until dissolved. Cool and bottle. Shelf life: 2-3 weeks refrigerated."],["Rich Simple Syrup (2:1)","1 cup water + 2 cups sugar. Heat until dissolved. Thicker body, longer shelf life. 3-4 weeks refrigerated."],["Demerara Syrup","1 cup water + 1 cup demerara sugar. Heat until dissolved. Adds caramel and molasses depth. 2-3 weeks refrigerated."],["Honey Syrup","1 cup honey + 1 cup warm water. Stir until fully incorporated \u2014 do not boil. 3-4 weeks refrigerated."],["Honey-Ginger Syrup","3/4 cup honey + 1/4 cup water + 1/2 cup fresh ginger (roughly chopped). Warm over low heat, stir until honey dissolves \u2014 do not boil. Steep 20-30 min. Strain. Shelf: 2-3 weeks refrigerated. Make the day before \u2014 flavor deepens overnight."],["Ginger Syrup","1 cup water + 1 cup sugar + 1 cup chopped ginger. Simmer 10 min, steep 30 min, strain. 2 weeks refrigerated."],["Cinnamon Syrup","1 cup water + 1 cup sugar + 3 cinnamon sticks. Simmer 10 min, steep 30 min, strain. 2 weeks refrigerated."],["Vanilla Syrup","1 cup water + 1 cup sugar + 1 split vanilla bean. Dissolve sugar, steep bean 30-60 min. 3 weeks refrigerated."],["Orgeat","1 cup almond milk + 1 cup sugar + 1 tsp orange blossom water + 1/2 tsp almond extract. Warm and mix. 2 weeks refrigerated."],["Basil Syrup","1 cup water + 1 cup sugar, dissolve then steep 1 cup fresh basil leaves 30 min off heat. Strain. 1-2 weeks refrigerated."]]},{"name":"Cucumber Syrups","type":"table","headers":["Type","Recipe"],"rows":[["Classic Cucumber (1:1)","Heat 1 cup water + 1 cup sugar until dissolved. Cool 10 min. Blend with 1 sliced cucumber (peel on) 15-20 sec. Steep 30-45 min. Strain through fine mesh. Optional: 1/2 tsp citric acid to brighten. Shelf: 7-10 days."],["Crystal-Clear Cucumber","Make classic syrup, blend with cucumber, add 2 tbsp milk, rest 20-30 min (milk proteins bind sediment). Strain through coffee filter. Shelf: 10-14 days."],["Zero-Calorie Cucumber","Heat 1 cup water + 1 cup allulose or Truvia until dissolved. Blend with 1 cucumber + 1/2 tsp citric acid 15-20 sec. Steep 30 min. Strain. Optional: 1/8 tsp xanthan gum for body. Shelf: 2 weeks."]]},{"name":"20% Saline Solution","type":"table","headers":["",""],"rows":[["Recipe","20 g fine sea salt + 100 g (or ml) water. Combine in a small bottle or container. Shake or stir until the salt is completely dissolved. Store in a dropper bottle for easy dosing."],["Shelf life","Indefinite at room temperature. No refrigeration needed."],["Usage","1-3 drops per cocktail. Saline does not make the drink taste salty \u2014 it reduces bitterness and enhances sweetness and citrus brightness."],["Best for","Margaritas, Palomas, Gimlets, Grapefruit drinks, Tiki cocktails, Egg-white/foam cocktails"],["Pro tip","Start with 1 drop, taste, and adjust. Pairs especially well with grapefruit, tequila, rum, and tropical drinks."]]},{"name":"10% Citric Acid Solution","type":"table","headers":["",""],"rows":[["Recipe","10 g citric acid powder + 100 g water. Shake until fully dissolved."],["Shelf life","6-12 months refrigerated or room temperature."],["Usage","2-6 drops per cocktail to brighten flavor without adding citrus juice."],["Best for","Spirit-forward drinks needing brightness \u00b7 Highballs \u00b7 Clarified cocktails \u00b7 Tiki drinks"]]}]},{"name":"Foams & Citrus","subsections":[{"name":"Egg White Foam","type":"bullets","items":["Always dry shake first \u2014 no ice. 10-15 seconds to fully emulsify the egg white.","Add ice and shake again hard for 10-12 seconds to chill.","Double strain into a chilled coupe \u2014 no chips, clean foam surface.","Garnish foam with bitters art: drop 3 dashes of Angostura in a line and drag with a toothpick.","Use 1 fresh egg white (roughly 3/4 oz) per drink. Pasteurized whites work but produce less foam."]},{"name":"Aquafaba Foam (Vegan Egg White Sub)","type":"table","headers":["Type","Method"],"rows":[["Basic aquafaba foam","3/4 oz aquafaba (canned chickpea liquid) per drink. Dry shake 15-20 sec, then shake with ice."],["Salt aquafaba foam","1 oz aquafaba + 1/4 tsp fine sea salt + 1/4 oz simple syrup. Whip with frother until lightly foamy. Spoon onto drink surface."],["Texture note","Aquafaba produces a slightly lighter, more delicate foam than egg white. Use 20 sec dry shake for best results."]]},{"name":"Salt Foam \u2014 Fee Foam (Bee Brothers)","type":"table","headers":["Foam Type","Recipe & Use"],"rows":[["Classic Salt Foam","1 oz water \u00b7 1/2 oz simple syrup \u00b7 4-6 drops Fee Foam \u00b7 2-3 drops saline. Dry shake 15-20 sec. Spoon onto drink."],["Grapefruit Salt Cloud","1 oz grapefruit juice \u00b7 1/2 oz simple syrup \u00b7 4-6 drops Fee Foam \u00b7 2-3 drops saline. Dry shake, float onto drink."],["Citrus Salt Foam","1 oz water \u00b7 1/2 oz simple syrup \u00b7 1/2 tsp citrus juice \u00b7 4-6 drops Fee Foam \u00b7 2-3 drops saline."],["Vanilla Salt Foam","1 oz water \u00b7 1/2 oz vanilla syrup \u00b7 4-6 drops Fee Foam \u00b7 2 drops saline. Best for Espresso Martinis."],["Peach Salt Foam","1 oz peach juice or syrup \u00b7 1/2 oz simple if using juice \u00b7 4-6 drops Fee Foam \u00b7 2-3 drops saline."],["Stabilized Craft Foam","1 oz water \u00b7 1/2 oz simple \u00b7 4-6 drops Fee Foam \u00b7 2-3 drops saline \u00b7 1/8 tsp xanthan gum. Blend 5-10 sec."]]},{"name":"Super Juice \u2014 High-Yield Citrus","type":"table","headers":["Citrus","Recipe"],"rows":[["Lemon","Peels from 2 lemons \u00b7 9 g citric acid \u00b7 2 g malic acid \u00b7 16 oz water \u00b7 juice of peeled lemons (3-4 oz)"],["Lime","Peels from 2 limes \u00b7 8 g citric acid \u00b7 2 g malic acid \u00b7 15.5 oz water \u00b7 juice of peeled limes (3 oz)"],["Grapefruit","Peels from 1/2 to 1 grapefruit \u00b7 8 g citric acid \u00b7 3 g malic acid \u00b7 16 oz water \u00b7 juice from grapefruit (4-5 oz)"],["Orange","Peels from 1 large orange \u00b7 10 g citric acid \u00b7 2 g malic acid \u00b7 16 oz water \u00b7 juice of orange (4 oz)"],["Yuzu","Peels from 1-2 yuzu \u00b7 7 g citric acid \u00b7 3 g malic acid \u00b7 16 oz water \u00b7 juice from fruit (3-4 oz)"],["Mandarin / Tangerine","Peels from 2 mandarins \u00b7 9 g citric acid \u00b7 2 g malic acid \u00b7 16 oz water \u00b7 juice of fruit (4 oz)"]]},{"name":"Milk Clarification Basics","type":"table","headers":["Step","Detail"],"rows":[["Step 1 - Build the cocktail","Mix the full cocktail \u2014 spirit, citrus, syrups, and any fruit \u2014 without ice."],["Step 2 - Add warm milk","Add whole milk or oat milk (about 2-4 oz per 8 oz cocktail). The acid in citrus causes the milk to curdle and bind particles."],["Step 3 - Rest","Let sit 10-30 minutes until fully curdled and separated."],["Step 4 - Strain","Strain through a coffee filter or fine cheesecloth. Go slowly \u2014 this takes 30-60 minutes for a clean result."],["Step 5 - Chill and serve","Refrigerate until service. Clarified cocktails keep 3-5 days and serve well on large clear ice or straight up."],["Best for","Mai Tai, Jungle Bird, Painkiller, Rum Punch \u2014 any tiki or fruit-forward drink where clarity adds drama"]]}]},{"name":"Seasonal Ingredient Calendar","subsections":[{"name":"Spring (March - May)","type":"table","headers":["Category","Spring Highlights"],"rows":[["Peak fruits","Strawberries \u00b7 Rhubarb \u00b7 Blood orange (early) \u00b7 Lemon \u00b7 Lime"],["Peak herbs","Basil (young) \u00b7 Mint \u00b7 Chives \u00b7 Lemon verbena"],["Flavor mood","Bright, floral, fresh \u2014 light citrus, elderflower, herbal gin drinks"],["Cocktail direction","Smashes, Fizzes, Spritzes, Floral Martinis, French 75 riffs"],["Sections to feature","Floral & Elegant \u00b7 Sours \u00b7 Smashes \u00b7 Spritz"]]},{"name":"Summer (June - August)","type":"table","headers":["Category","Summer Highlights"],"rows":[["Peak fruits","Watermelon \u00b7 Peach \u00b7 Mango \u00b7 Pineapple \u00b7 Passionfruit \u00b7 Blueberry \u00b7 Raspberry \u00b7 Cherry"],["Peak herbs","Basil \u00b7 Mint \u00b7 Tarragon \u00b7 Lemon balm \u00b7 Rosemary"],["Flavor mood","Tropical, fruity, refreshing \u2014 bold citrus, cold and crisp"],["Cocktail direction","Palomas, Margaritas, Daiquiris, Highballs, Frozen, Tiki, Garden builds"],["Sections to feature","Garden & Summer \u00b7 Tropical & Fruity \u00b7 Tiki & Punch \u00b7 Daiquiris \u00b7 Palomas"]]},{"name":"Fall (September - November)","type":"table","headers":["Category","Fall Highlights"],"rows":[["Peak fruits","Apple \u00b7 Pear \u00b7 Fig \u00b7 Pomegranate \u00b7 Persimmon \u00b7 Grape \u00b7 Cranberry (late)"],["Peak spices","Cinnamon \u00b7 Nutmeg \u00b7 Allspice \u00b7 Clove \u00b7 Cardamom \u00b7 Ginger"],["Flavor mood","Warm, spiced, earthy \u2014 whiskey, cognac, amaro, apple-forward"],["Cocktail direction","Whiskey Sours, Old Fashioneds, Smashes, warm drinks, smoke-forward builds"],["Sections to feature","Fall & Holiday \u00b7 Old Fashioneds \u00b7 Manhattans \u00b7 Smoke & Showstoppers"]]},{"name":"Winter (December - February)","type":"table","headers":["Category","Winter Highlights"],"rows":[["Peak fruits","Blood orange \u00b7 Grapefruit \u00b7 Pomelo \u00b7 Yuzu \u00b7 Mandarin \u00b7 Cranberry \u00b7 Meyer lemon"],["Peak spices","Cinnamon \u00b7 Clove \u00b7 Star anise \u00b7 Nutmeg \u00b7 Vanilla \u00b7 Cardamom"],["Flavor mood","Rich, warming, citrus-bright \u2014 cognac, rum, holiday spice, Champagne"],["Cocktail direction","Hot drinks, Punches, Holiday Spritzes, Blood Orange Negronis, Pomegranate Sours"],["Sections to feature","Fall & Holiday \u00b7 Dessert & After Dinner \u00b7 Classics \u00b7 Tiki & Punch"]]}]}]};

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTable(sub) {
  var hasHeaders = sub.headers && sub.headers[0] && sub.headers[0] !== '';
  var html = '<div class="tbl-wrap"><table>';
  if (hasHeaders) {
    html += '<thead><tr>';
    sub.headers.forEach(function(h) { html += '<th>' + esc(h) + '</th>'; });
    html += '</tr></thead>';
  }
  html += '<tbody>';
  sub.rows.forEach(function(row, ri) {
    html += '<tr>';
    row.forEach(function(cell) { html += '<td>' + esc(cell) + '</td>'; });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderBullets(sub) {
  var html = '<ul class="ref-bullets">';
  sub.items.forEach(function(item) { html += '<li>' + esc(item) + '</li>'; });
  html += '</ul>';
  return html;
}

function renderSubsection(sub) {
  var html = '<div class="subsection">';
  html += '<div class="subsection-name">' + esc(sub.name) + '</div>';
  if (sub.type === 'table') html += renderTable(sub);
  else if (sub.type === 'bullets') html += renderBullets(sub);
  html += '</div>';
  return html;
}

function renderSections(query) {
  var el = document.getElementById('sectionsEl');
  var html = '';
  var q = query ? query.trim().toLowerCase() : '';

  REF.sections.forEach(function(sec, si) {
    var secHTML = '';
    var matchCount = 0;

    sec.subsections.forEach(function(sub) {
      if (q) {
        var subText = sub.name.toLowerCase();
        if (sub.type === 'table') {
          sub.rows.forEach(function(row) { subText += ' ' + row.join(' ').toLowerCase(); });
          if (sub.headers) subText += ' ' + sub.headers.join(' ').toLowerCase();
        } else if (sub.type === 'bullets') {
          subText += ' ' + sub.items.join(' ').toLowerCase();
        }
        if (subText.indexOf(q) === -1) return;
      }
      matchCount++;
      secHTML += renderSubsection(sub);
    });

    if (q && matchCount === 0) return;

    html += '<div class="section">';
    html += '<button class="section-toggle" onclick="toggleSection(this)">';
    html += '<span class="section-name">' + esc(sec.name) + '</span>';
    html += '<span class="section-meta"><span class="section-count">' + sec.subsections.length + ' topics</span><span class="section-chevron">&#9660;</span></span>';
    html += '</button>';
    html += '<div class="section-body">' + secHTML + '</div>';
    html += '</div>';
  });

  if (!html) {
    html = '<div class="search-empty">No results found for &ldquo;' + esc(query) + '&rdquo;</div>';
  }
  el.innerHTML = html;

  // Auto-open all sections when searching
  if (q) {
    document.querySelectorAll('.section-toggle').forEach(function(btn) {
      btn.classList.add('open');
      btn.nextElementSibling.classList.add('open');
    });
  }
}

function toggleSection(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

var searchTimer;
document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(searchTimer);
  var val = e.target.value;
  searchTimer = setTimeout(function() { renderSections(val); }, 200);
});

renderSections('');
</script>
